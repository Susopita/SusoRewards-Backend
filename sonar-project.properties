# SonarQube Unified Backend Configuration
sonar.projectKey=susorewards_backend
sonar.projectName=SusoRewards Backend
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Source and Test directories relative to backend root
sonar.sources=afiliados/src,recompensas/src,notificaciones/src
sonar.tests=afiliados/src,recompensas/tests,notificaciones/tests

# Inclusions and Exclusions
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.spec.ts,**/*.test.ts,**/test/**
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/tests/**/*.rs

# Coverage Reports
# Afiliados coverage (LCOV)
sonar.javascript.lcov.reportPaths=afiliados/coverage/lcov.info

# Rust coverage (Tarpaulin/Cobertura xml if used in pipeline)
sonar.rust.cobertura.reportPaths=recompensas/cobertura.xml,notificaciones/cobertura.xml
